<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สถานะบอทของซีม่อน 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #ffc3a0 0%, #ffafbd 100%);
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 450px;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .bot-card {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            text-align: center;
        }
        h1 {
            color: #d81b60;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #777;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .status-box {
            margin: 12px 0;
            padding: 15px 20px;
            border-radius: 15px;
            background-color: #fdf0f3;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            border-left: 5px solid #ffafbd;
        }
        .online { color: #2e7d32; }
        .offline { color: #c62828; }
        .value { color: #555; }
        .footer {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="wrapper" id="bots-container">
        <h3 style="text-align:center; color:#fff;">กำลังโหลดข้อมูลบอทจากปาย... ⏳</h3>
    </div>

    <div class="footer">
        เจ้าของ: <b>ซีม่อน</b> | ผู้ร่วมพัฒนา: <b>ปาย</b> 💖<br>
        <small>อัปเดตข้อมูลแบบเรียลไทม์ 🔄</small>
    </div>

    <script>
        function formatUptime(ms) {
            if (!ms) return '0 วินาที';
            let seconds = Math.floor((ms / 1000) % 60);
            let minutes = Math.floor((ms / (1000 * 60)) % 60);
            let hours = Math.floor((ms / (1000 * 60 * 60)) % 24);
            let days = Math.floor(ms / (1000 * 60 * 60 * 24));
            
            let timeString = '';
            if (days > 0) timeString += `${days} วัน `;
            if (hours > 0) timeString += `${hours} ชม. `;
            if (minutes > 0) timeString += `${minutes} นาที `;
            timeString += `${seconds} วินาที`;
            return timeString;
        }

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const bots = await response.json();
                
                let htmlContent = '';

                bots.forEach(bot => {
                    let statusHtml = bot.isOnline 
                        ? '<span class="online">ออนไลน์ พร้อมใช้งาน ✅</span>' 
                        : '<span class="offline">ออฟไลน์ ❌</span>';

                    // สร้างหน้าการ์ดของแต่ละบอท
                    htmlContent += `
                        <div class="bot-card">
                            <h1>✨ ${bot.name} ✨</h1>
                            <div class="subtitle">ระบบดูแลอัตโนมัติตลอด 24 ชั่วโมง</div>
                            
                            <div class="status-box">
                                <span>🟢 สถานะบอท:</span>
                                <span>${statusHtml}</span>
                            </div>
                    `;

                    // เฉพาะบอทตัวหลักเท่านั้นที่จะโชว์ปิงและเวลาได้ (เพราะเป็นบอทที่เราถือ Token อยู่)
                    if (bot.isMain) {
                        htmlContent += `
                            <div class="status-box">
                                <span>📡 ความหน่วง (Ping):</span>
                                <span class="value">${bot.ping >= 0 ? bot.ping : 0} ms</span>
                            </div>
                            <div class="status-box">
                                <span>⏱️ เวลาทำงาน:</span>
                                <span class="value">${formatUptime(bot.uptime)}</span>
                            </div>
                        `;
                    }

                    htmlContent += `</div>`; // ปิดการ์ดบอท
                });

                document.getElementById('bots-container').innerHTML = htmlContent;

            } catch (error) {
                console.error('โหลดข้อมูลพลาด:', error);
            }
        }

        fetchStatus();
        setInterval(fetchStatus, 3000); // รีเฟรชข้อมูลทุก 3 วินาที
    </script>
</body>
</html>
