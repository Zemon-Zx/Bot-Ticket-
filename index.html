<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สถานะบอทของซีม่อน 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #000000; /* พื้นหลังสีดำสนิท */
            color: #ffffff; /* ตัวหนังสือสีขาวให้ตัดกับพื้นดำ */
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 450px;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .bot-card {
            background-color: rgba(20, 0, 0, 0.8); /* สีพื้นหลังการ์ดโทนดำแดง */
            padding: 30px;
            border-radius: 25px;
            border: 2px solid #8b0000; /* ขอบสีแดงเข้ม */
            box-shadow: 0 10px 25px rgba(255, 0, 0, 0.2); /* เงาสีแดงเท่ๆ */
            text-align: center;
            backdrop-filter: blur(5px);
        }
        h1 {
            color: #ff3333; /* ชื่อบอทสีแดงสว่าง */
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
        }
        .subtitle {
            color: #aaaaaa;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .status-box {
            margin: 12px 0;
            padding: 15px 20px;
            border-radius: 15px;
            background-color: rgba(255, 0, 0, 0.1); /* พื้นหลังสีแดงอ่อนๆ มองทะลุได้ */
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            border-left: 5px solid #cc0000; /* แถบด้านข้างสีแดงเข้ม */
            color: #eeeeee;
        }
        .online { color: #00ff00; text-shadow: 0 0 8px rgba(0, 255, 0, 0.6); }
        .offline { color: #ff3333; text-shadow: 0 0 8px rgba(255, 51, 51, 0.6); }
        .value { color: #ffcccc; } /* ค่าปิงและเวลาเป็นสีแดงอ่อน */
        .footer {
            margin-top: 20px;
            font-size: 14px;
            color: #777777;
            text-align: center;
        }
        
        /* ลูกเล่นอิโมจิกระพริบเท่ๆ */
        @keyframes blink-effect {
            0% { opacity: 1; text-shadow: 0 0 10px rgba(255, 255, 255, 0.8); }
            50% { opacity: 0.3; text-shadow: none; }
            100% { opacity: 1; text-shadow: 0 0 10px rgba(255, 255, 255, 0.8); }
        }
        .blink-emoji {
            display: inline-block;
            animation: blink-effect 1.5s infinite ease-in-out;
        }

        /* ลูกเล่นปุ่ม Discord กระพริบเรืองแสง โทนดำ-แดง */
        .discord-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 18px;
            padding: 10px 25px;
            background-color: #1a0000; /* พื้นหลังปุ่มสีดำอมแดงนิดๆ */
            color: #ff3333; /* ตัวหนังสือสีแดง */
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            font-size: 15px;
            transition: transform 0.3s ease, background-color 0.3s;
            animation: discord-pulse 1.5s infinite;
            border: 2px solid #cc0000; /* ขอบปุ่มสีแดง */
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }
        .discord-btn:hover {
            transform: scale(1.05);
            background-color: #330000; /* เวลากดสีจะสว่างขึ้นนิดหน่อย */
            color: white;
        }
        .discord-btn svg {
            width: 22px;
            height: 22px;
            fill: #ff3333; /* โลโก้ดิสคอร์ดสีแดง */
            transition: fill 0.3s;
        }
        .discord-btn:hover svg {
            fill: white;
        }
        @keyframes discord-pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0.8); }
            70% { box-shadow: 0 0 15px 12px rgba(255, 51, 51, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0); }
        }
    </style>
</head>
<body>

    <div class="wrapper" id="bots-container">
        <h3 style="text-align:center; color:#ff3333; text-shadow: 0 0 5px #ff0000;">กำลังโหลดข้อมูลบอทจากปาย... <span class="blink-emoji">⏳</span></h3>
    </div>

    <div class="footer">
        เจ้าของ: <b style="color:#ff3333;">ซีม่อน</b> | ผู้ร่วมพัฒนา: <b style="color:#ff3333;">ปาย</b> <span class="blink-emoji">💖</span><br>
        <small>อัปเดตข้อมูลแบบเรียลไทม์ <span class="blink-emoji">🔄</span></small><br>
        
        <a href="https://discord.gg/AYby9ypmyy" target="_blank" class="discord-btn">
            <svg viewBox="0 0 127.14 96.36">
                <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.31,60,73.31,53s5-12.74,11.43-12.74S96.33,46,96.22,53,91.17,65.69,84.69,65.69Z"/>
            </svg>
            เข้าร่วม Discord ของเรา
        </a>
    </div>

    <script>
        function formatUptime(ms) {
            if (!ms || ms < 0) return '0 วินาที';
            let seconds = Math.floor((ms / 1000) % 60);
            let minutes = Math.floor((ms / (1000 * 60)) % 60);
            let hours = Math.floor((ms / (1000 * 60 * 60)) % 24);
            let days = Math.floor(ms / (1000 * 60 * 60 * 24));
            
            let timeString = '';
            if (days > 0) timeString += `${days} วัน `;
            if (hours > 0) timeString += `${hours} ชม. `;
            if (minutes > 0) timeString += `${minutes} นาที `;
            timeString += `${seconds} วินาที`;
            return timeString;
        }

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const bots = await response.json();
                
                let htmlContent = '';

                bots.forEach(bot => {
                    let statusHtml = bot.isOnline 
                        ? '<span class="online">ออนไลน์ พร้อมใช้งาน <span class="blink-emoji">✅</span></span>' 
                        : '<span class="offline">ออฟไลน์ <span class="blink-emoji">❌</span></span>';

                    // สร้างหน้าการ์ดของแต่ละบอท
                    htmlContent += `
                        <div class="bot-card">
                            <h1><span class="blink-emoji">✨</span> ${bot.name} <span class="blink-emoji">✨</span></h1>
                            <div class="subtitle">ระบบดูแลอัตโนมัติตลอด 24 ชั่วโมง</div>
                            
                            <div class="status-box">
                                <span><span class="blink-emoji">🔴</span> สถานะบอท:</span>
                                <span>${statusHtml}</span>
                            </div>
                            
                            <div class="status-box">
                                <span><span class="blink-emoji">📡</span> ความหน่วง (Ping):</span>
                                <span class="value">${bot.ping >= 0 ? bot.ping : 0} ms</span>
                            </div>
                            
                            <div class="status-box">
                                <span><span class="blink-emoji">⏱️</span> เวลาทำงาน:</span>
                                <span class="value">${formatUptime(bot.uptime)}</span>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('bots-container').innerHTML = htmlContent;

            } catch (error) {
                console.error('โหลดข้อมูลพลาด:', error);
            }
        }

        fetchStatus();
        setInterval(fetchStatus, 3000); // รีเฟรชข้อมูลทุก 3 วินาที
    </script>
</body>
</html>
