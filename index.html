<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สถานะบอทของซีม่อน 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #ffc3a0 0%, #ffafbd 100%);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #d81b60;
            font-size: 26px;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #777;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .status-box {
            margin: 15px 0;
            padding: 15px 20px;
            border-radius: 15px;
            background-color: #fdf0f3;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            border-left: 5px solid #ffafbd;
        }
        .online { color: #2e7d32; }
        .offline { color: #c62828; }
        .value { color: #555; }
        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #888;
            border-top: 1px dashed #ccc;
            padding-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ BOT TICKET ✨</h1>
        <div class="subtitle">ระบบดูแลอัตโนมัติตลอด 24 ชั่วโมง</div>
        
        <div class="status-box">
            <span>🟢 สถานะบอท:</span>
            <span id="bot-status" class="value">กำลังโหลด...</span>
        </div>
        
        <div class="status-box">
            <span>📡 ความหน่วง (Ping):</span>
            <span id="bot-ping" class="value">กำลังโหลด...</span>
        </div>
        
        <div class="status-box">
            <span>⏱️ เวลาทำงาน:</span>
            <span id="bot-uptime" class="value">กำลังโหลด...</span>
        </div>

        <div class="footer">
            เจ้าของ: <b>ซีม่อน</b> | ผู้ร่วมพัฒนา: <b>ปาย</b> 💖<br>
            <small>อัปเดตข้อมูลแบบเรียลไทม์ 🔄</small>
        </div>
    </div>

    <script>
        // ฟังก์ชันแปลงเวลา ms เป็น วัน/ชั่วโมง/นาที/วินาที
        function formatUptime(ms) {
            if (!ms) return '0 วินาที';
            let seconds = Math.floor((ms / 1000) % 60);
            let minutes = Math.floor((ms / (1000 * 60)) % 60);
            let hours = Math.floor((ms / (1000 * 60 * 60)) % 24);
            let days = Math.floor(ms / (1000 * 60 * 60 * 24));
            
            let timeString = '';
            if (days > 0) timeString += `${days} วัน `;
            if (hours > 0) timeString += `${hours} ชม. `;
            if (minutes > 0) timeString += `${minutes} นาที `;
            timeString += `${seconds} วินาที`;
            return timeString;
        }

        // ฟังก์ชันดึงข้อมูลจากบอท
        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                const statusEl = document.getElementById('bot-status');
                if (data.isOnline) {
                    statusEl.innerHTML = '<span class="online">ออนไลน์ พร้อมใช้งาน ✅</span>';
                } else {
                    statusEl.innerHTML = '<span class="offline">ออฟไลน์ ❌</span>';
                }

                document.getElementById('bot-ping').innerText = `${data.ping >= 0 ? data.ping : 0} ms`;
                document.getElementById('bot-uptime').innerText = formatUptime(data.uptime);
            } catch (error) {
                document.getElementById('bot-status').innerHTML = '<span class="offline">ขาดการเชื่อมต่อ 💔</span>';
                document.getElementById('bot-ping').innerText = '- ms';
                document.getElementById('bot-uptime').innerText = '-';
            }
        }

        // โหลดข้อมูลทันที และตั้งเวลาอัปเดตทุกๆ 3 วินาที
        fetchStatus();
        setInterval(fetchStatus, 3000);
    </script>
</body>
</html>
